<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — 4L Tags</title>
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
/* ── Checkout page layout ── */
.checkout-page {
  width: min(calc(100% - 48px), 1100px);
  margin: 0 auto;
  padding: 48px 0 100px;
}

.checkout-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 40px;
  transition: opacity 180ms;
}
.checkout-back:hover { opacity: 0.7; }
.checkout-back::before { content: "\2190"; font-size: 15px; }

.checkout-heading {
  text-align: center;
  margin-bottom: 48px;
}
.checkout-heading h1 {
  margin: 0 0 10px;
  font-size: clamp(2rem, 4.5vw, 2.8rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  background: linear-gradient(90deg, #00d4ff 0%, #4f7cff 50%, #00d4ff 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
  animation: gradientShift 6s linear infinite;
}
.checkout-heading p {
  color: var(--muted);
  font-size: 16px;
}

.checkout-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}

/* ── Panel — reuses the same border/bg/backdrop as .info-card ── */
.co-panel {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--panel);
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  padding: 30px 28px;
}
.co-panel::before {
  content: "";
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.38), transparent);
}
.co-panel-title {
  margin: 0 0 26px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: #ffffff;
}

/* ── Order summary table ── */
.order-table {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: rgba(0, 0, 0, 0.22);
  overflow: hidden;
  margin-bottom: 22px;
}
.order-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 18px;
  font-size: 14px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}
.order-row:last-child { border-bottom: none; }
.order-row .lbl { color: var(--muted); }
.order-row .val { font-weight: 600; color: #ffffff; }
.order-row.total-row {
  background: rgba(0, 212, 255, 0.05);
  border-top: 1px solid rgba(0, 212, 255, 0.14);
}
.order-row.total-row .lbl { font-size: 15px; font-weight: 700; color: #ffffff; }
.order-row.total-row .val {
  font-size: 22px;
  font-weight: 800;
  color: var(--accent);
  text-shadow: 0 0 18px rgba(0, 212, 255, 0.38);
}

.co-tag-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 12px;
  border-radius: 999px;
  border: 1px solid rgba(0, 212, 255, 0.28);
  background: rgba(0, 212, 255, 0.07);
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.co-trust {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
  padding-top: 4px;
}
.co-trust span {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.co-trust span::before { content: "\2713"; color: var(--accent); font-weight: 700; }

/* ── Form fields — mirrors #searchInput from style.css ── */
.co-form-group { margin-bottom: 20px; }
.co-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 9px;
}
.co-label .req { color: var(--accent); margin-left: 2px; }

.co-input {
  width: 100%;
  height: 50px;
  padding: 0 16px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.02);
  color: var(--text);
  font-size: 15px;
  font-family: var(--font-main);
  outline: none;
  box-sizing: border-box;
  transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
}
.co-input::placeholder { color: var(--muted-2); }
.co-input:focus {
  border-color: rgba(0, 212, 255, 0.42);
  background: rgba(255, 255, 255, 0.03);
  box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.08), 0 0 24px rgba(0, 212, 255, 0.08);
}
.co-input.error {
  border-color: rgba(255, 80, 80, 0.55);
  box-shadow: 0 0 0 3px rgba(255, 80, 80, 0.08);
}

.co-textarea {
  width: 100%;
  min-height: 96px;
  padding: 13px 16px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.02);
  color: var(--text);
  font-size: 15px;
  font-family: var(--font-main);
  outline: none;
  resize: vertical;
  box-sizing: border-box;
  transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
}
.co-textarea::placeholder { color: var(--muted-2); }
.co-textarea:focus {
  border-color: rgba(0, 212, 255, 0.42);
  background: rgba(255, 255, 255, 0.03);
  box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.08), 0 0 24px rgba(0, 212, 255, 0.08);
}

/* ── Payment selector ── */
.co-payment-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.co-pay-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 9px;
  padding: 16px 8px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.02);
  color: rgba(255, 255, 255, 0.55);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-main);
  cursor: pointer;
  transition: border-color 180ms, background 180ms, color 180ms, box-shadow 180ms;
}
.co-pay-btn:hover {
  border-color: rgba(0, 212, 255, 0.3);
  color: #ffffff;
  background: rgba(0, 212, 255, 0.04);
}
.co-pay-btn.active {
  border-color: var(--accent);
  background: rgba(0, 212, 255, 0.1);
  color: var(--accent);
  box-shadow: 0 0 16px rgba(0, 212, 255, 0.18);
}
.co-pay-icon { font-size: 20px; line-height: 1; }
.co-pay-icon svg { width: 22px; height: 22px; display: block; }

/* ── Complete Order button — same gradient as .hero-cta-primary ── */
.co-submit-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 58px;
  margin-top: 26px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #10d7ee, #19c7f4 35%, #33a6ff 100%);
  color: #031018;
  font-size: 17px;
  font-weight: 700;
  font-family: var(--font-main);
  letter-spacing: -0.01em;
  cursor: pointer;
  box-shadow: 0 0 24px rgba(0, 212, 255, 0.32), 0 14px 34px rgba(0, 0, 0, 0.2);
  transition: transform 180ms ease, box-shadow 180ms ease;
}
.co-submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 40px rgba(0, 212, 255, 0.52);
}
.co-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.co-submit-btn.success {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  box-shadow: 0 0 24px rgba(34, 197, 94, 0.35);
}

.co-tos {
  text-align: center;
  font-size: 12px;
  color: var(--muted-2);
  margin-top: 14px;
  line-height: 1.65;
}
.co-tos a { color: var(--accent); text-decoration: none; }
.co-tos a:hover { text-decoration: underline; }

/* ── Empty cart ── */
.co-empty {
  text-align: center;
  padding: 80px 24px;
  color: var(--muted);
}
.co-empty .co-big {
  display: block;
  font-size: 72px;
  color: rgba(255, 255, 255, 0.06);
  font-weight: 900;
  margin-bottom: 16px;
}
.co-empty a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-top: 20px;
  min-height: 50px;
  padding: 0 28px;
  border-radius: 12px;
  background: linear-gradient(135deg, #10d7ee, #33a6ff);
  color: #031018;
  font-weight: 700;
  text-decoration: none;
}

@media (max-width: 820px) {
  .checkout-grid { grid-template-columns: 1fr; }
  .checkout-page { padding: 28px 0 80px; }
}
</style>
</head>

<body class="tag-page">
<nav class="site-nav" aria-label="Primary">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html" aria-label="4L Tags Home">
      <span class="nav-brand-mark"></span>
      <span class="nav-brand-text">4L TAGS</span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-menu" id="nav-menu">
      <a class="nav-link" href="index.html">Home</a>
      <div class="nav-item">
        <button class="nav-link nav-link-button" type="button" aria-expanded="false">
          Products <span class="nav-caret"></span>
        </button>
        <div class="nav-dropdown">
          <a href="index.html#gridContainer">Marketplace</a>
        </div>
      </div>
      <div class="nav-item">
        <button class="nav-link nav-link-button" type="button" aria-expanded="false">
          Documentation <span class="nav-caret"></span>
        </button>
        <div class="nav-dropdown">
          <a href="index.html#faq-anchor">FAQ</a>
          <a href="index.html#how-it-works">Swap Process</a>
        </div>
      </div>
      <a class="nav-cta" href="https://discord.com/users/820729520754524161" target="_blank" rel="noopener noreferrer">Community</a>
    </div>
  </div>
</nav>

<div id="cursor-light" aria-hidden="true"></div>

<main class="checkout-page" id="checkoutRoot"></main>

<script>
/* ── Nav (identical pattern on every page) ── */
const _nav         = document.querySelector('.site-nav');
const _navToggle   = document.querySelector('.nav-toggle');
const _navMenu     = document.querySelector('.nav-menu');
const _navItems    = document.querySelectorAll('.nav-item');
const _cursorLight = document.getElementById('cursor-light');

if (_navToggle && _navMenu) {
  _navToggle.addEventListener('click', () => {
    const isOpen = _navMenu.classList.toggle('open');
    _navToggle.setAttribute('aria-expanded', String(isOpen));
  });
}
_navItems.forEach(item => {
  const trigger = item.querySelector('.nav-link-button');
  if (!trigger) return;
  trigger.addEventListener('click', () => {
    if (window.innerWidth > 900) return;
    const isOpen = item.classList.toggle('open');
    trigger.setAttribute('aria-expanded', String(isOpen));
  });
});
document.addEventListener('click', e => {
  if (!_nav || _nav.contains(e.target)) return;
  _navMenu?.classList.remove('open');
  _navToggle?.setAttribute('aria-expanded', 'false');
  _navItems.forEach(item => {
    item.classList.remove('open');
    item.querySelector('.nav-link-button')?.setAttribute('aria-expanded', 'false');
  });
});
document.addEventListener('mousemove', e => {
  if (!_cursorLight) return;
  _cursorLight.style.left = e.clientX + 'px';
  _cursorLight.style.top  = e.clientY + 'px';
});

/* ── Checkout ── */
const root    = document.getElementById('checkoutRoot');
const cartRaw = localStorage.getItem('cart');

if (!cartRaw) {
  root.innerHTML = `
    <div class="co-empty">
      <span class="co-big">&#128722;</span>
      <p>Your cart is empty.</p>
      <a href="index.html">&larr; Back to Marketplace</a>
    </div>`;
} else {
  const cart  = JSON.parse(cartRaw);
  const tag   = cart.tag   || '';
  const price = parseFloat(cart.price) || 0;

  const TAX   = 0.08;
  const sub   = price;
  const tax   = +(sub * TAX).toFixed(2);
  const total = +(sub + tax).toFixed(2);
  const fmt   = n => '&pound;' + n.toFixed(2);

  root.innerHTML = `
    <a class="checkout-back" href="javascript:history.back()">Back to tag</a>

    <div class="checkout-heading">
      <h1>Order Summary</h1>
      <p>Complete your order details below</p>
    </div>

    <div class="checkout-grid">

      <div class="co-panel">
        <h2 class="co-panel-title">Order Details</h2>
        <div class="order-table">
          <div class="order-row">
            <span class="lbl">Service:</span>
            <span class="val">Rare Gamertag</span>
          </div>
          <div class="order-row">
            <span class="lbl">Tag:</span>
            <span class="val"><span class="co-tag-badge">${tag.toUpperCase()}</span></span>
          </div>
          <div class="order-row">
            <span class="lbl">Quantity:</span>
            <span class="val">1 gamertag</span>
          </div>
          <div class="order-row">
            <span class="lbl">Subtotal:</span>
            <span class="val">${fmt(sub)}</span>
          </div>
          <div class="order-row">
            <span class="lbl">Tax (8%):</span>
            <span class="val">${fmt(tax)}</span>
          </div>
          <div class="order-row total-row">
            <span class="lbl">Total:</span>
            <span class="val">${fmt(total)}</span>
          </div>
        </div>
        <div class="co-trust">
          <span>Secure checkout</span>
          <span>Instant delivery</span>
          <span>24/7 support</span>
        </div>
      </div>

      <div class="co-panel">
        <h2 class="co-panel-title">Customer Information</h2>

        <div class="co-form-group">
          <label class="co-label" for="coEmail">Email Address <span class="req">*</span></label>
          <input class="co-input" type="email" id="coEmail"
                 placeholder="your@email.com" autocomplete="email">
        </div>

        <div class="co-form-group">
          <label class="co-label" for="coNotes">
            Special Instructions
            <span style="color:var(--muted-2);text-transform:none;font-weight:400">(optional)</span>
          </label>
          <textarea class="co-textarea" id="coNotes"
                    placeholder="Any special requests or instructions..."></textarea>
        </div>

        <div class="co-form-group">
          <label class="co-label">Payment Method <span class="req">*</span></label>
          <div class="co-payment-grid" id="paymentGrid">
            <button class="co-pay-btn active" data-method="Card" type="button">
              <span class="co-pay-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="5" width="20" height="14" rx="2"/>
                  <line x1="2" y1="10" x2="22" y2="10"/>
                </svg>
              </span>
              Card
            </button>
            <button class="co-pay-btn" data-method="Google Pay" type="button">
              <span class="co-pay-icon">
                <svg viewBox="0 0 24 24" width="22" height="22">
                  <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z" fill="currentColor"/>
                </svg>
              </span>
              Google Pay
            </button>
            <button class="co-pay-btn" data-method="Other" type="button">
              <span class="co-pay-icon" style="font-size:18px;letter-spacing:3px">&middot;&middot;&middot;</span>
              Other
            </button>
          </div>
        </div>

        <button class="co-submit-btn" id="completeBtn" type="button">
          Complete Order &mdash; ${fmt(total)}
        </button>

        <p class="co-tos">
          By completing this purchase you agree to our
          <a href="index.html#faq-anchor">Terms of Service</a> and
          <a href="index.html#faq-anchor">Privacy Policy</a>.
        </p>
      </div>

    </div>`;

  /* Payment toggle */
  const payGrid = document.getElementById('paymentGrid');
  payGrid.addEventListener('click', e => {
    const btn = e.target.closest('.co-pay-btn');
    if (!btn) return;
    payGrid.querySelectorAll('.co-pay-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  /* Complete Order */
  const completeBtn = document.getElementById('completeBtn');
  const emailInput  = document.getElementById('coEmail');

  completeBtn.addEventListener('click', () => {
    const email  = emailInput.value.trim();
    const notes  = document.getElementById('coNotes').value.trim();
    const method = payGrid.querySelector('.co-pay-btn.active')?.dataset.method || 'Not specified';

    if (!email) {
      emailInput.classList.add('error');
      emailInput.focus();
      setTimeout(() => emailInput.classList.remove('error'), 2200);
      return;
    }

    const lines = [
      '\uD83C\uDFAE New Tag Order \u2014 4L Tags',
      '',
      'Tag:   ' + tag.toUpperCase(),
      'Price: \u00A3' + total.toFixed(2) + ' (incl. 8% tax)',
      'Pay:   ' + method,
      'Email: ' + email,
    ];
    if (notes) lines.push('Notes: ' + notes);

    localStorage.removeItem('cart');

    window.open('https://discord.com/users/820729520754524161', '_blank');

    completeBtn.textContent = '\u2713 Order sent \u2014 check Discord DM';
    completeBtn.classList.add('success');
    completeBtn.disabled = true;
  });
}
</script>
</body>
</html>
